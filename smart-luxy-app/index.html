  <style>
    html { background: #0a0a0a; }

    /* Empêche le déplacement quand le clavier s'ouvre */
    html, body {
      height: 100%;
      overscroll-behavior: none;
    }

    /* Modals fixes — ne bougent pas avec le clavier */
    [data-modal="true"] {
      position: fixed !important;
      top: 0 !important; left: 0 !important;
      right: 0 !important; bottom: 0 !important;
      height: 100% !important;
    }
  </style>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>

  <script>
    // ── Fix clavier Android/iOS qui déplace la page ──
    // Quand le clavier s'ouvre, on fixe la hauteur de la fenêtre
    function setVH() {
      const vh = window.innerHeight * 0.01
      document.documentElement.style.setProperty('--vh', vh + 'px')
    }
    setVH()
    window.addEventListener('resize', setVH)

    // Bloquer le scroll de la page quand un input dans un modal est focus
    document.addEventListener('focusin', function(e) {
      const tag = e.target.tagName
      if ((tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT')) {
        // Empêche le scroll automatique vers l'input
        setTimeout(() => {
          e.target.scrollIntoView({ block: 'nearest', behavior: 'smooth' })
        }, 300)
      }
    })

    // iOS: empêche le bounce scroll
    document.addEventListener('touchmove', function(e) {
      if (e.target.closest('[data-scroll="true"]')) return
      // Laisser défiler les modals
    }, { passive: true })
  </script>
</body>
